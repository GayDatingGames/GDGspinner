<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gay Dating Game — Spinner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --amber:#FBA31C; --amber-deep:#E08308;
    --ink:#15151A; --paper:#F1F1F4; --muted:#9a9aa6;
    --bg-0:#0b0c0f; --bg-1:#1d1e25;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:'Outfit',system-ui,-apple-system,sans-serif;
    color:var(--paper);
    background:#000;
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px,4vh,40px); padding:28px 18px calc(28px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  header{text-align:center; width:100%}
  .logo{
    display:block; margin:0 auto; width:min(76vw,400px); height:auto;
    user-select:none; -webkit-user-drag:none;
  }

  .spinner{display:flex; flex-direction:column; align-items:center; gap:clamp(20px,4.2vh,34px)}

  .stage{
    position:relative; width:min(86vw,520px); aspect-ratio:1;
    cursor:pointer; touch-action:manipulation; outline:none; border-radius:50%;
    -webkit-tap-highlight-color:transparent;
  }
  .stage:focus-visible{box-shadow:0 0 0 4px rgba(251,163,28,.65)}
  .stage:active .wheel{transform:scale(.992)}

  .wheel{
    width:100%; height:100%; display:block; border-radius:50%;
    user-select:none; -webkit-user-drag:none;
    filter:drop-shadow(0 20px 44px rgba(0,0,0,.55));
    transition:transform .12s ease;
  }
  .bottle{
    position:absolute; left:50%; top:50%; height:27%; width:auto;
    transform-origin:50% 50%; transform:translate(-50%,-50%) rotate(0deg);
    will-change:transform; pointer-events:none; user-select:none; -webkit-user-drag:none;
    filter:drop-shadow(0 4px 5px rgba(0,0,0,.5));
  }
  .gloss{
    position:absolute; inset:0; border-radius:50%; pointer-events:none;
    background:radial-gradient(120% 92% at 30% 20%, rgba(255,255,255,.22), rgba(255,255,255,0) 44%);
    mix-blend-mode:screen;
  }

  .controls{display:flex; align-items:center; gap:14px}
  .spin{
    font-family:'Outfit',sans-serif; font-weight:700; font-size:17px; letter-spacing:.02em;
    color:#2a1c05; border:0; cursor:pointer; padding:14px 40px; border-radius:999px;
    background:linear-gradient(180deg,#ffce82,var(--amber) 55%,var(--amber-deep));
    box-shadow:0 6px 18px rgba(251,163,28,.34), inset 0 1px 0 rgba(255,255,255,.55);
    transition:transform .08s ease, filter .15s ease, box-shadow .15s ease;
  }
  .spin:hover{filter:brightness(1.05)}
  .spin:active{transform:translateY(2px); box-shadow:0 3px 10px rgba(251,163,28,.3), inset 0 1px 0 rgba(255,255,255,.5)}
  .spin:disabled{opacity:.55; cursor:default; transform:none; filter:none}
  .spin:focus-visible{outline:none; box-shadow:0 0 0 4px rgba(251,163,28,.55), 0 6px 18px rgba(251,163,28,.34)}

  .mute{
    width:46px; height:46px; flex:0 0 auto; display:grid; place-items:center;
    border-radius:50%; cursor:pointer; color:var(--paper);
    background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .mute:hover{background:rgba(255,255,255,.1)}
  .mute.off{color:var(--muted)}
  .mute:focus-visible{outline:none; box-shadow:0 0 0 3px rgba(251,163,28,.55)}
  .mute svg{width:21px; height:21px; display:block}
</style>
</head>

    <div class="controls">
      <button class="spin" id="spinBtn">Spin</button>
      <button class="mute" id="muteBtn" aria-pressed="false" aria-label="Mute sound"></button>
    </div>
  </div>

<script>
  const stage  = document.getElementById('stage');
  const bottle = document.getElementById('bottle');
  const spinBtn= document.getElementById('spinBtn');
  const muteBtn= document.getElementById('muteBtn');

  const ICON_ON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
  const ICON_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>';
  muteBtn.innerHTML = ICON_ON;

  // neck (pointer) aimed at the centre of each quadrant; 0deg = straight up
  const BASE = { A:315, B:45, C:135, D:225 };
  const KEYS = ['A','B','C','D'];
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  let deg = 0, spinning = false, muted = false, actx = null;

  function ac(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
    return actx;
  }
  function tick(norm){
    if(muted) return; const c = ac(); if(!c) return;
    try{
      const o=c.createOscillator(), g=c.createGain(), t=c.currentTime;
      o.type='square'; o.frequency.value=410 + norm*540;
      const v=0.016 + norm*0.05;
      g.gain.setValueAtTime(v,t);
      g.gain.exponentialRampToValueAtTime(0.0006, t+0.05);
      o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.06);
    }catch(e){}
  }
  function ding(){
    if(muted) return; const c = ac(); if(!c) return;
    try{
      [660,988].forEach((f,i)=>{
        const o=c.createOscillator(), g=c.createGain(), t=c.currentTime+i*0.06;
        o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0.0001,t);
        g.gain.exponentialRampToValueAtTime(0.10, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.0004, t+0.5);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t+0.55);
      });
    }catch(e){}
  }

  function setRot(d){ bottle.style.transform = 'translate(-50%,-50%) rotate('+d+'deg)'; }

  function spin(){
    if(spinning) return;
    spinning = true; spinBtn.disabled = true;
    const c = ac(); if(c && c.state==='suspended'){ try{ c.resume(); }catch(e){} }

    const q      = KEYS[Math.floor(Math.random()*4)];
    const jitter = (Math.random()*2 - 1) * 38;            // anywhere inside the slice
    const turns  = reduce ? 1 : (4 + Math.floor(Math.random()*4)); // 4–7 full turns
    const start  = deg;
    const cur    = ((start % 360) + 360) % 360;
    const target = BASE[q] + jitter;
    const delta  = turns*360 + ((((target - cur) % 360) + 360) % 360);
    const end    = start + delta;
    const dur    = reduce ? 700 : (3600 + Math.random()*900);

    const t0 = performance.now();
    let prev = start, seg = Math.floor(start/24);

    function frame(now){
      let t = (now - t0) / dur; if(t>1) t=1;
      const e = reduce ? (1 - Math.pow(1-t,3)) : (1 - Math.pow(1-t,4.15));
      deg = start + delta*e;
      setRot(deg);
      const s = Math.floor(deg/24);
      if(s !== seg){ tick(Math.min(Math.abs(deg-prev)/14, 1)); seg = s; }
      prev = deg;
      if(t < 1){ requestAnimationFrame(frame); }
      else { deg = end; finish(end); }
    }
    requestAnimationFrame(frame);
  }

  function finish(end){
    if(reduce){ done(); return; }
    bottle.animate([
      { transform:'translate(-50%,-50%) rotate('+end+'deg)' },
      { transform:'translate(-50%,-50%) rotate('+(end+4)+'deg)', offset:.45 },
      { transform:'translate(-50%,-50%) rotate('+(end-1.5)+'deg)', offset:.75 },
      { transform:'translate(-50%,-50%) rotate('+end+'deg)' }
    ], { duration:520, easing:'ease-out' });
    setTimeout(done, 110);
  }
  function done(){ ding(); spinning = false; spinBtn.disabled = false; }

  stage.addEventListener('click', spin);
  spinBtn.addEventListener('click', e => { e.stopPropagation(); spin(); });
  stage.addEventListener('keydown', e => {
    if(e.key==='Enter' || e.key===' '){ e.preventDefault(); spin(); }
  });
  muteBtn.addEventListener('click', e => {
    e.stopPropagation();
    muted = !muted;
    muteBtn.setAttribute('aria-pressed', String(muted));
    muteBtn.classList.toggle('off', muted);
    muteBtn.innerHTML = muted ? ICON_OFF : ICON_ON;
    muteBtn.setAttribute('aria-label', muted ? 'Unmute sound' : 'Mute sound');
  });
</script>
